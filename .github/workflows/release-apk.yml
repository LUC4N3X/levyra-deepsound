name: Publish LEVYRA Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        required: true
        default: "v2.0.0"

permissions:
  contents: write

jobs:
  release:
    name: Build Release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        shell: bash
        run: |
          set -euo pipefail
          yes | "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null || true
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"             "platform-tools"             "platforms;android-36"             "build-tools;36.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.4"

      - name: Resolve Release Version
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${GITHUB_REF_NAME}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag }}"
          fi

          VERSION="${TAG_NAME#v}"
          VERSION="${VERSION#V}"

          if ! printf "%s" "${VERSION}" | grep -Eq '^[0-9]+(\.[0-9]+){0,3}([-+][0-9A-Za-z.-]+)?$'; then
            echo "Invalid release version: ${VERSION}" >&2
            exit 1
          fi

          BASE_VERSION="${VERSION%%[-+]*}"
          IFS='.' read -r MAJOR MINOR PATCH BUILD <<< "${BASE_VERSION}"

          MAJOR="${MAJOR:-0}"
          MINOR="${MINOR:-0}"
          PATCH="${PATCH:-0}"
          BUILD="${BUILD:-0}"

          VERSION_CODE=$((10#$MAJOR * 1000000 + 10#$MINOR * 10000 + 10#$PATCH * 100 + 10#$BUILD))

          echo "TAG_NAME=${TAG_NAME}" >> "${GITHUB_ENV}"
          echo "VERSION=${VERSION}" >> "${GITHUB_ENV}"
          echo "VERSION_CODE=${VERSION_CODE}" >> "${GITHUB_ENV}"

      - name: Build Release APK
        run: gradle --no-daemon clean assembleRelease -PlevyraVersionName="${VERSION}" -PlevyraVersionCode="${VERSION_CODE}"

      - name: Prepare Release
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          cp app/build/outputs/apk/release/app-release.apk "artifacts/LEVYRA-${VERSION}.apk"

          {
            echo "LEVYRA ${VERSION}"
            echo
            echo "Nuova build disponibile per il download diretto dall'app."
            echo
            echo "Aggiorna dall'app aprendo Impostazioni > Aggiornamenti > Check."
          } > release-notes.md

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: levyra-release-${{ env.VERSION }}
          path: artifacts/LEVYRA-${{ env.VERSION }}.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "artifacts/LEVYRA-${VERSION}.apk" --clobber
            gh release edit "${TAG_NAME}" --latest --title "LEVYRA ${VERSION}" --notes-file release-notes.md
          else
            gh release create "${TAG_NAME}" "artifacts/LEVYRA-${VERSION}.apk" --latest --title "LEVYRA ${VERSION}" --notes-file release-notes.md
          fi

